# Eingabe
#INPUT                  = include src
FILE_PATTERNS          = *.cpp *.h *.hpp *.c
RECURSIVE              = YES
EXCLUDE                = bin extern libs build games/default/game/g_func_decs.h

# Ausgabe
OUTPUT_DIRECTORY       = docs/doxygen
GENERATE_XML           = YES
XML_OUTPUT             = xml
GENERATE_HTML          = NO
GENERATE_LATEX         = NO

# Extraktion
EXTRACT_ALL            = YES
EXTRACT_PRIVATE        = NO
EXTRACT_STATIC         = YES
JAVADOC_AUTOBRIEF      = YES
WARN_IF_UNDOCUMENTED   = YES
WARN_LOGFILE           = docs/doxygen/doxygen_warnings.txt

# Gruppen/Seiten
ENABLE_PREPROCESSING   = YES
MACRO_EXPANSION        = YES
